name: Windows Installer Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Python for native rebuilds
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Build Windows installer
        run: pnpm build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          PYTHON: python
          npm_config_python: python

      - name: Verify bundled MCP sidecar
        run: pnpm --filter @the-vault/desktop verify:packaged-runtime

      - name: Generate SHA-256 checksum
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem "packages/desktop/dist/The-Vault-*-windows-*.exe")
          if ($installers.Count -ne 1) {
            throw "Expected exactly one Windows installer, found $($installers.Count)"
          }
          $installer = $installers[0]
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName).Hash.ToLowerInvariant()
          "$hash *$($installer.Name)" | Set-Content -NoNewline -Encoding ascii -LiteralPath "$($installer.FullName).sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-vault-windows-installer
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.sha256
            packages/desktop/dist/*.blockmap
            packages/desktop/dist/latest*.yml
          if-no-files-found: error

      - name: Prepare release notes
        shell: pwsh
        run: |
          $tagName = "${{ github.event.inputs.tag_name || github.ref_name }}"
          $sourcePath = ".github/release-notes/$tagName.md"

          if (Test-Path $sourcePath) {
            Copy-Item $sourcePath release-notes.md
          } else {
            @(
              "Windows installer for The Vault $tagName.",
              "",
              'This build packages the desktop app and the bundled `vault-memory` MCP sidecar runtime. After installing, open The Vault and use Settings -> Client setup to connect Codex, Claude Desktop, or Claude Code.'
            ) | Set-Content -Path release-notes.md
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag_name || github.ref_name, '-') }}
          files: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.sha256
            packages/desktop/dist/*.blockmap
            packages/desktop/dist/latest*.yml
          body_path: release-notes.md
