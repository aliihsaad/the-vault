name: Windows Installer Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to create or update, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Build Windows installer
        run: pnpm build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify bundled MCP sidecar
        shell: pwsh
        run: |
          $mcpRoot = "packages/desktop/dist/win-unpacked/resources/mcp"
          if (!(Test-Path "$mcpRoot/node.exe")) {
            throw "Missing bundled MCP Node runtime: $mcpRoot/node.exe"
          }
          if (!(Test-Path "$mcpRoot/dist/index.js")) {
            throw "Missing bundled MCP server entry: $mcpRoot/dist/index.js"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-vault-windows-installer
          path: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.blockmap
            packages/desktop/dist/latest*.yml
          if-no-files-found: error

      - name: Prepare release notes
        shell: pwsh
        run: |
          $tagName = "${{ github.event.inputs.tag_name || github.ref_name }}"
          $sourcePath = ".github/release-notes/$tagName.md"

          if (Test-Path $sourcePath) {
            Copy-Item $sourcePath release-notes.md
          } else {
            @(
              "Windows installer for The Vault $tagName.",
              "",
              'This build packages the desktop app and the bundled `vault-memory` MCP sidecar runtime. After installing, open The Vault and use Settings -> Client setup to connect Codex, Claude Desktop, or Claude Code.'
            ) | Set-Content -Path release-notes.md
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag_name || github.ref_name, '-') }}
          files: |
            packages/desktop/dist/*.exe
            packages/desktop/dist/*.blockmap
            packages/desktop/dist/latest*.yml
          body_path: release-notes.md
